<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TV Control Bubble</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

#bubble {
    position: fixed;
    right: 30px;
    bottom: 30px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #2196f3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    cursor: pointer;
}

#bubble.focused {
    outline: 5px solid yellow;
}

#menu {
    position: fixed;
    right: 30px;
    bottom: 120px;
    display: none;
}

.menu-item {
    width: 220px;
    padding: 15px;
    margin: 10px 0;
    background: #333;
}

.menu-item.focused {
    background: #2196f3;
    outline: 4px solid yellow;
}
</style>
</head>
<body>

<div id="bubble" class="focused">⚙</div>

<div id="menu">
    <div class="menu-item">Settings</div>
    <div class="menu-item">Accessibility</div>
    <div class="menu-item">Help</div>
    <div class="menu-item">Exit</div>
</div>

<script>
const bubble = document.getElementById('bubble');
const menu = document.getElementById('menu');
const items = [...document.querySelectorAll('.menu-item')];

let menuOpen = false;
let selected = 0;

function updateFocus() {
    items.forEach(i => i.classList.remove('focused'));

    if (!menuOpen) {
        bubble.classList.add('focused');
    } else {
        bubble.classList.remove('focused');
        items[selected].classList.add('focused');
    }
}

document.addEventListener('keydown', e => {

    if (!menuOpen) {

        if (e.key === 'Enter') {
            menuOpen = true;
            menu.style.display = 'block';
            selected = 0;
            updateFocus();
        }

    } else {

        if (e.key === 'ArrowDown') {
            selected = (selected + 1) % items.length;
            updateFocus();
        }

        if (e.key === 'ArrowUp') {
            selected = (selected - 1 + items.length) % items.length;
            updateFocus();
        }

        if (e.key === 'Enter') {
            alert('Selected: ' + items[selected].textContent);
        }

        if (e.key === 'Backspace' || e.key === 'Escape') {
            menuOpen = false;
            menu.style.display = 'none';
            updateFocus();
        }
    }
});
</script>

</body>
</html>
