<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TV Remote Debug</title>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    padding:20px;
}

#focusBtn{
    width:300px;
    height:80px;
    font-size:24px;
    margin-bottom:20px;
}

#focusBtn:focus{
    outline:5px solid yellow;
}

#status{
    font-size:32px;
    margin-bottom:20px;
}

#log{
    border:1px solid #555;
    padding:10px;
    height:400px;
    overflow:auto;
    word-wrap:break-word;
}
</style>
</head>
<body>

<h2>TV Remote Debug Tool</h2>

<button id="focusBtn" tabindex="0">
FOCUS TEST BUTTON
</button>

<div id="status">Waiting for remote input...</div>

<div id="log"></div>

<script>

const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");
const btn = document.getElementById("focusBtn");

function log(msg){
    console.log(msg);

    const div = document.createElement("div");
    div.textContent = msg;

    logEl.prepend(div);
}

window.onload = function(){

    btn.focus();

    statusEl.textContent =
        "Button focused. Press remote keys.";

    log("PAGE LOADED");
    log("BUTTON FOCUSED");
};

window.onerror = function(
    message,
    source,
    line,
    column,
    error
){
    statusEl.textContent = "ERROR DETECTED";

    log(
        "ERROR => " +
        message +
        " line:" +
        line
    );
};

document.addEventListener("focusin", function(e){

    log(
        "FOCUS => " +
        e.target.tagName
    );

});

document.addEventListener("click", function(e){

    statusEl.textContent =
        "CLICK RECEIVED";

    log(
        "CLICK => " +
        e.target.tagName
    );

}, true);

document.addEventListener("pointerdown", function(){

    log("POINTERDOWN");

}, true);

document.addEventListener("pointerup", function(){

    log("POINTERUP");

}, true);

document.addEventListener("keydown", function(e){

    statusEl.textContent =
        "KEY RECEIVED";

    log(
        "KEYDOWN => " +
        " key=" + e.key +
        " code=" + e.code +
        " keyCode=" + e.keyCode +
        " which=" + e.which
    );

    if(
        e.key === "Enter" ||
        e.keyCode === 13 ||
        e.keyCode === 23 ||
        e.keyCode === 66
    ){
        statusEl.textContent =
            "YES - OK BUTTON DETECTED";

        log(
            "SUCCESS => OK BUTTON DETECTED"
        );
    }

}, true);

document.addEventListener("keyup", function(e){

    log(
        "KEYUP => " +
        " key=" + e.key +
        " code=" + e.code +
        " keyCode=" + e.keyCode
    );

}, true);

document.addEventListener("keypress", function(e){

    log(
        "KEYPRESS => " +
        " key=" + e.key +
        " keyCode=" + e.keyCode
    );

}, true);

setTimeout(function(){

    if(
        statusEl.textContent ===
        "Waiting for remote input..."
        ||
        statusEl.textContent ===
        "Button focused. Press remote keys."
    ){
        statusEl.textContent =
            "NO INPUT DETECTED";
    }

},10000);

</script>

</body>
</html>
