<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV OK Test</title>
<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:100px;
}

#result{
    font-size:50px;
}
</style>
</head>
<body>

<div id="result">Waiting...</div>

<script>

const result = document.getElementById("result");

document.addEventListener("pointerdown", function(e){

    result.innerHTML = "YES";

    console.log("OK button detected via POINTERDOWN");

});

document.addEventListener("click", function(e){

    result.innerHTML = "YES";

    console.log("OK button detected via CLICK");

});

window.onerror = function(msg){

    result.innerHTML = "ERROR";

    console.error(msg);

};

setTimeout(function(){

    if(result.innerHTML === "Waiting..."){
        result.innerHTML = "NO";
    }

},10000);

</script>

</body>
</html>
