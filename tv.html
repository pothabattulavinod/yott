<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV Focus Navigation</title>

<style>
body{
    background:#111;
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:200px;
}

.item{
    width:200px;
    height:100px;
    background:#333;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.focused{
    outline:5px solid yellow;
    transform:scale(1.1);
}
</style>
</head>
<body>

<div class="item focused">Home</div>
<div class="item">Movies</div>
<div class="item">Settings</div>

<script>

const items = document.querySelectorAll('.item');
let current = 0;

function updateFocus() {
    items.forEach(el =>
        el.classList.remove('focused')
    );

    items[current]
        .classList.add('focused');
}

document.addEventListener('keydown', e => {

    if(e.key === 'ArrowRight'){
        current =
          (current + 1) % items.length;
        updateFocus();
    }

    if(e.key === 'ArrowLeft'){
        current =
          (current - 1 + items.length)
          % items.length;
        updateFocus();
    }

    if(e.key === 'Enter'){
        alert(
          'Selected: ' +
          items[current].textContent
        );
    }

});

document.addEventListener('pointerdown', () => {

    alert(
      'Selected: ' +
      items[current].textContent
    );

});

</script>

</body>
</html>
