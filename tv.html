<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV Remote Test</title>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

#status{
    font-size:40px;
    margin:20px 0;
}

#log{
    white-space:pre-wrap;
    border:1px solid #555;
    padding:10px;
    height:300px;
    overflow:auto;
}
</style>
</head>
<body>

<h1>TV Remote Test</h1>

<div id="status">Waiting...</div>

<div id="log"></div>

<script>

const statusBox = document.getElementById("status");
const logBox = document.getElementById("log");

let success = false;

function log(msg){
    console.log(msg);
    logBox.innerHTML += msg + "<br>";
}

window.onerror = function(message, source, line, col, error){
    statusBox.innerHTML = "ERROR";
    log(
        "ERROR: " + message +
        " | line: " + line +
        " | col: " + col
    );
};

document.addEventListener("keydown", function(e){

    log(
        "KEY = " + e.key +
        " | CODE = " + e.keyCode
    );

    if(
        e.key === "Enter" ||
        e.keyCode === 13
    ){
        success = true;
        statusBox.innerHTML = "YES";
        log("SUCCESS: OK button detected");
    }
});

setTimeout(function(){

    if(!success){
        statusBox.innerHTML = "NO";
        log("NO OK BUTTON DETECTED");
    }

},10000);

</script>

</body>
</html>
