<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TV Navigation Demo</title>

<style>

html,
body,
*{
    cursor:none !important;
}

body{
    margin:0;
    background:#111;
    font-family:Arial,sans-serif;
    color:white;
    overflow:hidden;
}

.header{
    padding:30px;
    font-size:40px;
}

.row{
    display:flex;
    gap:25px;
    padding:40px;
}

.card{
    width:260px;
    height:150px;
    background:#333;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    transition:all .2s;
}

.card.focused{
    background:#2196f3;
    outline:6px solid yellow;
    transform:scale(1.08);
}

#message{
    position:fixed;
    left:20px;
    bottom:20px;
    font-size:24px;
}

</style>
</head>
<body>

<div class="header">
TV Navigation
</div>

<div class="row">
    <div class="card focused">Home</div>
    <div class="card">Movies</div>
    <div class="card">Series</div>
    <div class="card">Sports</div>
    <div class="card">Settings</div>
</div>

<div id="message">
Focused: Home
</div>

<script>

const cards =
    document.querySelectorAll(".card");

const message =
    document.getElementById("message");

let current = 0;

function updateFocus(){

    cards.forEach(card=>{
        card.classList.remove("focused");
    });

    cards[current]
        .classList.add("focused");

    message.innerHTML =
        "Focused: " +
        cards[current].textContent;
}

function selectCurrent(){

    const text =
        cards[current].textContent;

    message.innerHTML =
        "Selected: " + text;

    console.log(
        "Selected:",
        text
    );

    alert(
        "Selected: " + text
    );
}

document.addEventListener(
    "keydown",
    function(e){

        if(
            e.key === "ArrowRight" ||
            e.keyCode === 39
        ){

            current++;

            if(
                current >= cards.length
            ){
                current = 0;
            }

            updateFocus();
        }

        else if(
            e.key === "ArrowLeft" ||
            e.keyCode === 37
        ){

            current--;

            if(
                current < 0
            ){
                current =
                    cards.length - 1;
            }

            updateFocus();
        }

        else if(
            e.key === "Enter" ||
            e.keyCode === 13
        ){

            selectCurrent();
        }
    }
);

document.addEventListener(
    "pointerdown",
    function(){

        selectCurrent();

    }
);

window.onload = function(){

    updateFocus();

    document.body.style.cursor =
        "none";

};

</script>

</body>
</html>
