<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TV Remote Bubble Menu</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#content{
    padding:40px;
}

#bubble{
    position:fixed;
    right:30px;
    bottom:30px;
    width:80px;
    height:80px;
    border-radius:50%;
    background:#2196f3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    border:none;
    cursor:pointer;
    z-index:1000;
}

#bubble:focus,
#bubble.focused{
    outline:5px solid yellow;
    transform:scale(1.1);
}

#menu{
    position:fixed;
    right:30px;
    bottom:130px;
    width:250px;
    display:none;
    z-index:1001;
}

.menu-item{
    background:#333;
    padding:18px;
    margin-bottom:8px;
    font-size:20px;
}

.menu-item.focused{
    background:#2196f3;
    outline:4px solid yellow;
}
</style>
</head>
<body>

<div id="content">
    <h1>TV Browser Demo</h1>
    <p>Use your TV remote.</p>
    <p>Press OK on the bubble to open menu.</p>
    <p>Use UP and DOWN to navigate.</p>
</div>

<button id="bubble" tabindex="0">⚙</button>

<div id="menu">
    <div class="menu-item">Settings</div>
    <div class="menu-item">Accessibility</div>
    <div class="menu-item">Help</div>
    <div class="menu-item">Exit</div>
</div>

<script>
const bubble = document.getElementById("bubble");
const menu = document.getElementById("menu");
const items = document.querySelectorAll(".menu-item");

let menuOpen = false;
let currentIndex = 0;

function focusBubble() {
    bubble.focus();
    bubble.classList.add("focused");
}

function removeMenuFocus() {
    items.forEach(item => item.classList.remove("focused"));
}

function updateMenuFocus() {
    removeMenuFocus();
    items[currentIndex].classList.add("focused");
}

function openMenu() {
    menuOpen = true;
    menu.style.display = "block";
    bubble.classList.remove("focused");
    currentIndex = 0;
    updateMenuFocus();
}

function closeMenu() {
    menuOpen = false;
    menu.style.display = "none";
    removeMenuFocus();
    focusBubble();
}

window.addEventListener("load", () => {
    focusBubble();
});

document.addEventListener("keydown", (e) => {

    console.log("KEY:", e.key, e.keyCode);

    if (!menuOpen) {

        if (
            e.key === "Enter" ||
            e.keyCode === 13
        ) {
            openMenu();
        }

    } else {

        if (
            e.key === "ArrowUp" ||
            e.keyCode === 38
        ) {
            currentIndex--;
            if (currentIndex < 0) {
                currentIndex = items.length - 1;
            }
            updateMenuFocus();
        }

        else if (
            e.key === "ArrowDown" ||
            e.keyCode === 40
        ) {
            currentIndex++;
            if (currentIndex >= items.length) {
                currentIndex = 0;
            }
            updateMenuFocus();
        }

        else if (
            e.key === "Enter" ||
            e.keyCode === 13
        ) {
            alert("Selected: " +
                items[currentIndex].textContent);
        }

        else if (
            e.key === "Escape" ||
            e.key === "Backspace" ||
            e.keyCode === 27 ||
            e.keyCode === 461 ||
            e.keyCode === 10009
        ) {
            closeMenu();
        }
    }
});

bubble.addEventListener("click", openMenu);
</script>

</body>
</html>
