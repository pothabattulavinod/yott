<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TV Remote Navigation</title>
  <style>
    .item {
      display: inline-block;
      width: 200px;
      height: 100px;
      margin: 10px;
      background: #ddd;
      text-align: center;
      line-height: 100px;
      font-size: 20px;
    }

    .focused {
      outline: 4px solid blue;
      background: #fff3a0;
    }
  </style>
</head>
<body>
  <div class="item focused" tabindex="0">Item 1</div>
  <div class="item" tabindex="0">Item 2</div>
  <div class="item" tabindex="0">Item 3</div>

  <script>
    const items = [...document.querySelectorAll('.item')];
    let current = 0;

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        move(1);
      } else if (e.key === 'ArrowLeft') {
        move(-1);
      } else if (e.key === 'Enter') {
        alert(items[current].textContent + ' selected');
      }
    });

    function move(step) {
      items[current].classList.remove('focused');
      current = (current + step + items.length) % items.length;
      items[current].classList.add('focused');
      items[current].focus();
    }
  </script>
</body>
</html>
